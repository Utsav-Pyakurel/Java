name: Excavator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

permissions:
  checks: write
  contents: write
  packages: read

jobs:
  excavate:
    name: Excavate
    runs-on: ubuntu-latest

    steps:
      - name: Setup PSE
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY_EXCAVATE}}

      - uses: actions/checkout@v4

      - name: Excavate
        uses: ScoopInstaller/GithubActions@main
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          SKIP_UPDATED: '1'

      - name: Cleanup PSE
        if: always()
        uses: invisirisk/pse-action@latest
        with:
          cleanup: "true"

  gather_status_excavate:
    name: Gather Status for excavate
    runs-on: ubuntu-latest
    needs: excavate
    if: always()

    steps:
      - name: Gather Status
        uses: invisirisk/pse-action@latest
        with:
          api_url: "https://app.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY_EXCAVATE}}
          send_job_status: "true"
          debug: "true"
